<svg xmlns="http://www.w3.org/2000/svg" width="700" height="430" viewBox="0 0 700 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14181f" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#252b35" />
      <stop offset="100%" stop-color="#1b2029" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect width="700" height="430" rx="20" fill="url(#bg)" />
  <circle cx="96" cy="76" r="72" fill="#ffffff" opacity="0.035" />
  <circle cx="620" cy="350" r="88" fill="#ffffff" opacity="0.03" />

  <text x="52" y="72" fill="#f6f8fb" font-size="34" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700">
    Aigeon
  </text>
  <text x="52" y="110" fill="#b6c0cf" font-size="22" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    Drag Aigeon to Applications
  </text>

  <g filter="url(#shadow)">
    <rect x="102" y="186" rx="28" ry="28" width="144" height="144" fill="url(#panel)" stroke="#39414d" stroke-width="1.5" />
    <text x="174" y="258" text-anchor="middle" fill="#8fb0ff" font-size="24" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700">
      Aigeon
    </text>
    <text x="174" y="288" text-anchor="middle" fill="#92a1b5" font-size="16" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
      App
    </text>
  </g>

  <text x="350" y="270" text-anchor="middle" fill="#6d7787" opacity="0.9" font-size="54" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    →
  </text>

  <g filter="url(#shadow)">
    <rect x="454" y="186" rx="28" ry="28" width="144" height="144" fill="url(#panel)" stroke="#39414d" stroke-width="1.5" />
    <text x="526" y="258" text-anchor="middle" fill="#d3dae5" font-size="22" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700">
      Applications
    </text>
  </g>
</svg>
