<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aigeon 演示页</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #172033;
        --muted: #5f6c89;
        --line: #d9e0ee;
        --accent: #275df5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }

      .hero,
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 18px 50px rgba(28, 42, 78, 0.08);
      }

      .hero {
        padding: 28px;
        margin-bottom: 24px;
      }

      .card {
        padding: 24px;
        margin-bottom: 20px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: 34px;
        margin-bottom: 10px;
      }

      h2 {
        font-size: 24px;
        margin-bottom: 14px;
      }

      p,
      li {
        line-height: 1.6;
      }

      .muted {
        color: var(--muted);
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--accent);
        color: white;
        background: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      .button.secondary {
        color: var(--accent);
        background: transparent;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }

      img,
      video {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: #dde6fb;
      }

      ul {
        padding-left: 20px;
        margin-bottom: 0;
      }

      .lang {
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Aigeon</h1>
        <p class="muted">
          一个轻量的 macOS 悬浮层，用来监控当前 Claude Code 和 Codex 任务，并且可以直接在页面里播放演示视频。
        </p>
        <div class="links">
          <a
            class="button"
            href="https://github.com/moringchen/aigeon/raw/main/Aigeon_0.1.0_x64.dmg"
            download="Aigeon_0.1.0_x64.dmg"
          >
            下载 DMG
          </a>
          <a
            class="button secondary"
            href="https://github.com/moringchen/aigeon/raw/main/Aigeon_0.1.0_x64.tar.gz"
            download="Aigeon_0.1.0_x64.tar.gz"
          >
            下载 TAR.GZ
          </a>
          <a class="button secondary" href="./README.zh-CN.md">打开说明</a>
        </div>
        <p class="lang">
          English: <a href="./index.html">index.html</a>
        </p>
      </section>

      <section class="card">
        <h2>演示视频</h2>
        <video controls preload="metadata" poster="./demo/standard-mode-full-20260602.png">
          <source src="./demo/demo-video.mov" type="video/quicktime" />
        </video>
      </section>

      <section class="card">
        <h2>截图</h2>
        <div class="grid">
          <div>
            <h3>标准模式</h3>
            <img src="./demo/standard-mode-full-20260602.png" alt="标准模式截图" />
          </div>
          <div>
            <h3>简单模式</h3>
            <img src="./demo/simple-mode-full-20260602.png" alt="简单模式截图" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>当前支持</h2>
        <ul>
          <li>任务来源：Claude Code、Codex</li>
          <li>任务点击跳转终端：macOS Terminal、Ghostty</li>
          <li>稳定状态：booting、waiting、running、completed</li>
          <li>提示音：waiting、completed</li>
        </ul>
      </section>
    </main>
  </body>
</html>
